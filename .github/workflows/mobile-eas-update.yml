# Publica actualizaciones OTA (JS/assets) cuando cambia mobile/ en main.
# Requiere secret EXPO_TOKEN en GitHub: Settings → Secrets → Actions.
name: Mobile EAS Update

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-eas-update.yml'

jobs:
  eas-update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish EAS Update (preview channel)
        run: npx eas-cli update --channel preview --message "${{ github.event.head_commit.message }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
