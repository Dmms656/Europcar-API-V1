syntax = "proto3";

option csharp_namespace = "RedCar.Shared.Protos.Localizaciones";

package redcar.localizaciones.v1;

// Contrato gRPC de MS.Localizaciones. Por ahora solo Ping.
service LocalizacionesGrpc {
  rpc Ping (PingRequest) returns (PingResponse);
}

message PingRequest {
  string caller = 1;
}

message PingResponse {
  string service = 1;
  string version = 2;
  string echo = 3;
  string server_time_utc = 4;
}
