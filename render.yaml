# Blueprint Render — sitio estático Europcar (Expo / REACT_NATIVE)
# Si el servicio ya existe en el dashboard, replica estos valores allí.
# Redirect SPA: Settings → Redirects/Rewrites → /* → /index.html (Rewrite)
services:
  - type: web
    name: europcar-frontend
    runtime: static
    rootDir: REACT_NATIVE
    buildCommand: npm ci && npm run build:web
    staticPublishPath: dist
    buildFilter:
      paths:
        - REACT_NATIVE/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_API_URL
        sync: false
      # Cloudinary (cuando se porte subida de imágenes en admin vehículos):
      # - key: EXPO_PUBLIC_CLOUDINARY_CLOUD_NAME
      #   sync: false
      # - key: EXPO_PUBLIC_CLOUDINARY_UPLOAD_PRESET
      #   sync: false
