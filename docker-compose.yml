services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: redcar-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: redcar
      RABBITMQ_DEFAULT_PASS: redcar_dev
      RABBITMQ_DEFAULT_VHOST: /redcar-marketplace
    volumes:
      - redcar_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redcar_rabbitmq_data:
